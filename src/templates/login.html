<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Spam Detection System</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:8px;
            width:300px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#4CAF50;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        .register{
            text-align:center;
            margin-top:10px;
        }

    </style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form action="/dashboard" method="GET">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="register">

<p>No account?</p>

<a href="/register">Register Here</a>

</div>

</div>

</body>

</html>
